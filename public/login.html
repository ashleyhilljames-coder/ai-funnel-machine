<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncro Scale - Command Center Authentication</title>
    <meta name="description" content="Secure authentication gate for the Syncro Scale Command Center dashboard.">
    <!-- Load Outfit font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-primary);
            overflow: hidden;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }
        .login-card {
            padding: 35px 30px;
            background: rgba(12, 15, 22, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: var(--border-radius-lg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .login-header {
            text-align: center;
        }
        .login-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .logo-accent {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.4;
        }
        .error-banner {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
            padding: 12px;
            border-radius: var(--border-radius-sm);
            font-size: 0.8rem;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Background Glowing Circles -->
    <div class="bg-glow bg-glow-blue" style="top: 25%; left: 30%; width: 450px; height: 450px;"></div>
    <div class="bg-glow bg-glow-purple" style="bottom: 25%; right: 30%; width: 450px; height: 450px;"></div>

    <div class="login-container">
        <div class="glass-card login-card">
            <div class="login-header">
                <div class="login-logo"><span class="logo-accent">Syncro</span> Scale</div>
                <p class="login-subtitle">Dashboard Command Center Authentication</p>
            </div>

            <!-- Error Banner -->
            <div id="error-banner" class="error-banner">
                ❌ <span id="error-message">Invalid credentials.</span>
            </div>

            <form id="login-form" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="login-client-id" class="form-label" style="font-size: 0.8rem; font-weight: 700; color: var(--text-secondary);">Account ID or Username</label>
                    <input type="text" id="login-client-id" class="form-input" style="padding: 12px; border-radius: var(--border-radius-sm); border: 1px solid var(--glass-border); background: var(--bg-secondary); color: #fff; font-family: inherit; font-size: 0.9rem;" placeholder="e.g. restoration_lv or admin" required>
                </div>
                
                <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="login-password" class="form-label" style="font-size: 0.8rem; font-weight: 700; color: var(--text-secondary);">Account Password</label>
                    <input type="password" id="login-password" class="form-input" style="padding: 12px; border-radius: var(--border-radius-sm); border: 1px solid var(--glass-border); background: var(--bg-secondary); color: #fff; font-family: inherit; font-size: 0.9rem;" placeholder="••••••••" required>
                </div>

                <button type="submit" id="login-submit-btn" class="btn btn-primary" style="padding: 14px; border-radius: var(--border-radius-sm); font-size: 0.9rem; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; width: 100%; box-sizing: border-box;">
                    🔑 Authenticate Session
                </button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
